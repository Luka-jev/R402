name: CI - Rent Service and SonarCloud

on:
  push:
    branches: [ main, newcarservice ]
  pull_request:
    branches: [ main, newcarservice ]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Run Tests with Coverage (Rent)
        run: |
          cd ./rent/MyService
          chmod +x gradlew
          ./gradlew test jacocoTestReport

      - name: Build and analyze (SonarCloud)
        env:
          SONAR_HOST_URL: https://sonarcloud.io
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}     
        run: |
          cd ./rent/MyService
          chmod +x gradlew
          ./gradlew build sonar --info

      - name: Build Docker images
        run: |
          cd ./rent/MyService
          docker build -t myservice:latest .
